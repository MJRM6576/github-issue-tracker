<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- disiui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?
    family=Geist:wght@100..       900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./tailwind.config.css">
    <title>Github Issue Tracker</title>
</head>

<body>
    <header>
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <img class="w-12" src="./assets/github-logo.png" alt="" srcset="">
                <a class="text-2xl font-semibold">GitHub Issues Tracker</a>
            </div>
            <div class="navbar-end space-x-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>

                <a class="btn bg-primary text-white"> + New Issue</a>
            </div>
        </div>

        <section >
            <div class=" w-[70%] mx-auto space-x-1 mt-6 bg-gray-200 border-2 p-2">
                <button id="allButton" class="btn bg-blue-500 text-white px-6">All</button>
                <button id="openButton" class="btn bg-blue-500 text-white px-6">Open</button>
                <button id="closedButton" class="btn bg-blue-500 text-white px-6">Closed</button>
            </div>
        </section>

    </header>

    <main>
        <div class="w-[70%] mx-auto mt-6">
            <div class="flex justify-between items-center"> 
                <!-- issu Header -->
                 <div class="flex gap-2 items-center">
                    <img src="./assets/Aperture.png" alt="" srcset="">
                    <div>
                        <p> 50 isues</p>
                        <p>Track and manage your project issues</p>
                    </div>
                 </div>

                 <div class="flex gap-2 items-center">
                    <p class="bg-green-200 text-green-600 px-3"> Open </p>
                    <p class="bg-purple-200 text-purple-600 px-3"> Closed </p>
                 </div>
                 
            </div>



            <div>
                <!-- issuse dody -->
            </div>
        </div>
    </main>


    <script src="./index.js"></script>

</body>

</html>
